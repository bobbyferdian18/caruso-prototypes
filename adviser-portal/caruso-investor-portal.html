<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investor Portal – Ventura</title>
  <style>
    /* Font: Using system -apple-system stack as SF Pro Text fallback */

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #1e2332;
      background: #ffffff;
      min-height: 100vh;
    }

    /* ─── TOP NAV BAR ─── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      background: #042246;
      display: flex;
      align-items: center;
      padding: 0 32px;
      z-index: 50;
      transition: background 0.25s ease;
      gap: 16px;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      flex-shrink: 0;
    }

    .topbar-logo svg { height: 29px; width: auto; }

    .topbar-switcher {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      width: 20px; height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }
    .topbar-switcher svg { width: 10px; height: 10px; }
    .topbar-switcher:hover { background: rgba(255,255,255,0.1); }

    .topbar-spacer { flex: 1; }

    /* Horizontal nav links */
    .topbar-nav {
      display: flex;
      align-items: center;
      gap: 0;
      height: 60px;
    }
    .topbar-nav a {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 60px;
      padding: 0 16px;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      white-space: nowrap;
      transition: color 0.15s;
      border-bottom: 2px solid transparent;
    }
    .topbar-nav a:hover { color: rgba(255,255,255,0.8); }
    .topbar-nav a.active {
      color: #ffffff;
      border-bottom-color: #ffffff;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.3);
      color: rgba(255,255,255,0.8);
      border-radius: 4px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s;
    }
    .topbar-btn:hover {
      border-color: rgba(255,255,255,0.6);
      color: #ffffff;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      position: fixed;
      left: 0;
      top: 60px;
      width: 220px;
      height: calc(100vh - 60px);
      background: #112c37;
      padding: 24px 16px;
      overflow-y: auto;
      z-index: 40;
    }

    .sidebar-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-top: 24px;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .sidebar-section-title:first-child { margin-top: 0; }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 13px;
      font-weight: 400;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .sidebar-nav a:hover {
      color: rgba(255,255,255,0.9);
      background: rgba(255,255,255,0.05);
    }

    .sidebar-nav a.active {
      background: #7f6df1;
      color: #ffffff;
    }

    .sidebar-badge {
      background: rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ─── MAIN CONTENT ─── */
    .main {
      margin-left: 220px;
      margin-top: 60px;
      padding: 32px;
      background: #ffffff;
      min-height: calc(100vh - 60px);
    }

    /* ─── PAGE HEADER ─── */
    .page-header {
      margin-bottom: 32px;
    }

    .breadcrumb {
      font-size: 13px;
      color: #8c95a6;
      margin-bottom: 12px;
    }

    .breadcrumb .active {
      color: #7f6df1;
      font-weight: 600;
    }

    .page-title {
      font-size: 24px;
      font-weight: 600;
      color: #0a0a0a;
      margin-bottom: 24px;
    }

    /* ─── CONTROLS BAR ─── */
    .controls-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      background: rgba(104,122,144,0.06);
      border: 1px solid #d8dae5;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      color: #0a0a0a;
    }

    .search-box::placeholder {
      color: #8c95a6;
    }

    .filter-btn {
      background: #ffffff;
      border: 1px solid #d8dae5;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      color: #0a0a0a;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-btn:hover {
      border-color: #7f6df1;
      background: #f9f7ff;
    }

    .primary-btn {
      background: #7f6df1;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      color: #ffffff;
      cursor: pointer;
      transition: all 0.15s;
    }

    .primary-btn:hover {
      background: #6b5dd4;
    }

    /* ─── VIEW TOGGLE (CARUSO ONLY) ─── */
    .view-toggle {
      display: flex;
      background: #f0f2f5;
      border-radius: 6px;
      padding: 4px;
      gap: 0;
    }

    .view-toggle-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      color: #8c95a6;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .view-toggle-btn.active {
      background: #ffffff;
      color: #0a0a0a;
      font-weight: 600;
    }

    /* ─── TABLES ─── */
    .table-wrapper {
      background: #ffffff;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #d8dae5;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead {
      background: #f9fafb;
      border-bottom: 1px solid #e6e8f0;
    }

    th {
      padding: 12px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: #8c95a6;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    td {
      padding: 12px;
      color: #0a0a0a;
      border-bottom: 1px solid #f0f2f5;
      height: 56px;
      vertical-align: middle;
    }

    tr:last-child td {
      border-bottom: none;
    }

    /* Sticky left column (ID/Fund) */
    td:first-child, th:first-child {
      position: sticky;
      left: 0;
      background: #ffffff;
      z-index: 10;
      border-right: 1px solid #e6e8f0;
    }

    thead th:first-child {
      background: #f9fafb;
    }

    /* Sticky right column (View button or AI summary) */
    td:last-child, th:last-child {
      position: sticky;
      right: 0;
      background: #ffffff;
      z-index: 10;
    }

    thead th:last-child {
      background: #f9fafb;
    }

    td:last-child::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 1px;
      background: #e6e8f0;
    }

    /* Subheader row (for Grouped view) */
    .subheader {
      background: #f9fafb;
      height: 40px;
      font-size: 12px;
      font-weight: 600;
      color: #8c95a6;
      text-transform: uppercase;
    }

    .subheader td {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid #e6e8f0;
    }

    .subheader-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* BADGE STYLES */
    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      height: 32px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.key-contact {
      background: #ede9fd;
      color: #7f6df1;
    }

    .badge.adviser {
      background: #e7f5ee;
      color: #2e7d57;
    }

    .badge.investor {
      background: #e3f0fb;
      color: #1a6ea8;
    }

    .badge.prospect {
      background: #fef3e8;
      color: #c07514;
    }

    .badge.full-access {
      background: #e7f5ee;
      color: #2e7d57;
    }

    .badge.read-only {
      background: #e3f0fb;
      color: #1a6ea8;
    }

    .badge.complete {
      background: #e7f5ee;
      color: #2e7d57;
    }

    .badge.pending {
      background: #fef3e8;
      color: #c07514;
    }

    .badge.processing {
      background: #e3f0fb;
      color: #1a6ea8;
    }

    .badge.cancelled {
      background: #fce8e8;
      color: #c03744;
    }

    /* VIEW BUTTON */
    .view-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 1px solid #e0e4ea;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      transition: all 0.15s;
      color: #0a0a0a;
      font-size: 12px;
    }

    .view-btn:hover {
      border-color: #d8dae5;
      background: #f9fafb;
    }

    /* AI SUMMARY BUTTON */
    .ai-summary-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      border: 1px solid #e0e4ea;
      border-radius: 6px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .ai-summary-btn:hover {
      border-color: #d8dae5;
      background: #f9fafb;
    }

    .ai-summary-btn svg {
      width: 16px;
      height: 16px;
      fill: #949AB0;
    }

    /* VIEW BUTTON BADGE */
    .view-btn-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #d6e0ff;
      color: #2952cc;
      border-radius: 8px;
      padding: 0 8px;
      height: 24px;
      font-size: 11px;
      font-weight: 600;
      margin-right: 8px;
    }

    /* EMAIL BUTTON */
    .email-btn {
      background: #ffffff;
      border: 1px solid #d8dae5;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      color: #0a0a0a;
      font-size: 13px;
      transition: all 0.15s;
    }

    .email-btn:hover {
      border-color: #7f6df1;
      background: #f9f7ff;
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .pagination-btn {
      background: #ffffff;
      border: 1px solid #d8dae5;
      border-radius: 4px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      color: #0a0a0a;
      transition: all 0.15s;
    }

    .pagination-btn:hover:not(:disabled) {
      border-color: #7f6df1;
      background: #f9f7ff;
    }

    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-btn.active {
      background: #7f6df1;
      color: #ffffff;
      border-color: #7f6df1;
    }

    /* DROPDOWNS */
    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      background: #ffffff;
      border: 1px solid #d8dae5;
      border-radius: 6px;
      margin-top: 4px;
      z-index: 1000;
      min-width: 200px;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .dropdown-menu.hidden {
      display: none;
    }

    .dropdown-item {
      padding: 12px 16px;
      cursor: pointer;
      color: #0a0a0a;
      font-size: 13px;
      border-bottom: 1px solid #f0f2f5;
      transition: background 0.15s;
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background: #f9fafb;
    }

    .dropdown-item.active {
      background: #f0f2f5;
      font-weight: 600;
    }
  </style>
</head>

  function setupEventListeners() {
    // FM Switcher
    document.getElementById('fmSwitcher').addEventListener('click', (e) => {
      e.stopPropagation();
      const menu = document.getElementById('fmDropdown');
      menu.classList.toggle('hidden');
    });

    document.getElementById('fmDropdown').addEventListener('click', (e) => {
      const fm = e.target.dataset.fm;
      if (fm) {
        document.querySelectorAll('#fmDropdown .dropdown-item').forEach(item => {
          item.classList.remove('active');
        });
        e.target.classList.add('active');
        document.getElementById('fmDropdown').classList.add('hidden');
        switchFundManager(fm);
      }
    });

    // Tab navigation
    document.querySelectorAll('.topbar-nav .nav-link').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        const tab = e.target.dataset.tab;
        if (tab) {
          document.querySelectorAll('.topbar-nav .nav-link').forEach(l => {
            l.classList.remove('active');
          });
          e.target.classList.add('active');
          switchTab(tab);
        }
      });
    });

    // Search
    document.getElementById('searchInput').addEventListener('input', (e) => {
      currentPage = 1;
      renderTable();
    });

    // Status filter
    document.getElementById('statusFilter').addEventListener('change', (e) => {
      currentPage = 1;
      renderTable();
    });
  }

  function switchFundManager(fm) {
    currentFM = fm;
    currentPage = 1;

    const config = fundManagers[fm];
    const topbar = document.getElementById('topbar');
    topbar.style.background = config.color;

    document.getElementById('pageTitle').textContent = `${config.name} Holdings`;

    // Update nav tabs
    const navLinks = document.querySelectorAll('.topbar-nav .nav-link');
    navLinks.forEach((link, i) => {
      if (i < config.navTabs.length) {
        link.dataset.tab = config.navTabs[i];
        link.textContent = config.navTabs[i].charAt(0).toUpperCase() + config.navTabs[i].slice(1);
        link.style.display = 'flex';
      } else {
        link.style.display = 'none';
      }
    });

    // Reset active tab
    document.querySelectorAll('.topbar-nav .nav-link').forEach(l => l.classList.remove('active'));
    document.querySelector('[data-tab="portfolio"]').classList.add('active');
    currentTab = 'portfolio';
    currentView = 'default';

    // Show/hide view toggle for caruso
    const viewToggleContainer = document.getElementById('viewToggleContainer');
    viewToggleContainer.innerHTML = '';
    if (config.isCaruso) {
      const toggle = document.createElement('div');
      toggle.className = 'view-toggle';
      toggle.innerHTML = `
        <button class="view-toggle-btn active" data-view="summary">Summary</button>
        <button class="view-toggle-btn" data-view="detailed">Detailed</button>
        <button class="view-toggle-btn" data-view="grouped">Grouped</button>
      `;
      toggle.addEventListener('click', (e) => {
        if (e.target.classList.contains('view-toggle-btn')) {
          document.querySelectorAll('.view-toggle-btn').forEach(btn => {
            btn.classList.remove('active');
          });
          e.target.classList.add('active');
          currentView = e.target.dataset.view;
          currentPage = 1;
          renderTable();
        }
      });
      viewToggleContainer.appendChild(toggle);
    }

    renderTable();
  }

          const th = document.createElement('th');
          th.textContent = col;
          thead.appendChild(th);
        });

        const filteredData = filterData(data);
        const paginatedData = paginate(filteredData);

        paginatedData.forEach(row => {
          const tr = document.createElement('tr');
          const statusBadge = `<span class="badge ${row.status}">${row.status.toUpperCase()}</span>`;
          tr.innerHTML = `
            <td>${row.date}</td>
            <td>${row.type}</td>
            <td>${row.fund}</td>
            <td>${row.class}</td>
            <td>${row.units.toLocaleString()}</td>
            <td>${row.price}</td>
            <td>${row.value}</td>
            <td>${statusBadge}</td>
            <td><button class="view-btn">→</button></td>
          `;
          tbody.appendChild(tr);
        });
      }
    }

    updatePagination(filterData(data).length);
  }

  function filterData(data) {
    const searchValue = document.getElementById('searchInput').value.toLowerCase();
    const statusValue = document.getElementById('statusFilter').value;

    return data.filter(row => {
      const matchesSearch = Object.values(row).some(val =>
        String(val).toLowerCase().includes(searchValue)
      );
      // Status filter logic - can be extended
      return matchesSearch;
    });
  }

  function paginate(data) {
    const start = (currentPage - 1) * ROWS_PER_PAGE;
    const end = start + ROWS_PER_PAGE;
    return data.slice(start, end);
  }

  function updatePagination(totalRows) {
    const totalPages = Math.ceil(totalRows / ROWS_PER_PAGE);
    const pagination = document.getElementById('pagination');
    pagination.innerHTML = '';

    if (totalPages <= 1) return;

    const prevBtn = document.createElement('button');
    prevBtn.className = 'pagination-btn';
    prevBtn.textContent = '← Prev';
    prevBtn.disabled = currentPage === 1;
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
      }
    });
    pagination.appendChild(prevBtn);

    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement('button');
      btn.className = `pagination-btn ${i === currentPage ? 'active' : ''}`;
      btn.textContent = i;
      btn.addEventListener('click', () => {
        currentPage = i;
        renderTable();
      });
      pagination.appendChild(btn);
    }

    const nextBtn = document.createElement('button');
    nextBtn.className = 'pagination-btn';
    nextBtn.textContent = 'Next →';
    nextBtn.disabled = currentPage === totalPages;
    nextBtn.addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage++;
        renderTable();
      }
    });
    pagination.appendChild(nextBtn);
  }
</script>

<script>
  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    const dropdown = document.getElementById('fmDropdown');
    const switcher = document.getElementById('fmSwitcher');
    if (!switcher.contains(e.target) && !dropdown.contains(e.target)) {
      dropdown.classList.add('hidden');
    }
  });
</script>

</body>
